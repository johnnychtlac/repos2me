<div nz-flex [nzAlign]="'center'" [nzVertical]=true>
    <nz-list>
        @for (item of currentPageItems(); track item.id) {
            <nz-list-item [nzNoFlex]=true>
                <p>宏包：{{ item.id }}</p>
                <p>简介：{{ item.subtitle }}</p>
                @if (item.date) {
                    <p>更新日期：{{ item.date }}</p>
                }
                @else {
                    <p>该项目未收录至CTAN</p>
                }
                <p>标签：{{ item.labels }}</p>
                <nz-space>
                    <button *nzSpaceItem nz-button nzType="primary" [nzSize]="'small'" (click)="showDetail(item.id)">详细信息</button>
                    @for (val of item.docpaths; track val) {
                        <button *nzSpaceItem nz-button nzType="primary" [nzSize]="'small'" (click)="openDocument(val)">文档目录</button>
                    }
                    <!-- <button *nzSpaceItem nz-button [disabled]=true nzType="primary" [nzSize]="'small'">文档目录</button> -->
                </nz-space>
            </nz-list-item>
        }
    </nz-list>
    @if (isPC) {
        <nz-pagination [nzPageIndex]="1" [nzTotal]="totalCount()" (nzPageIndexChange)="changePage($event)" />
    }
    @else {
        <nz-pagination nzSimple [nzPageIndex]="1" [nzTotal]="totalCount()" (nzPageIndexChange)="changePage($event)" />
    }
</div>
